<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Barcode-Checker – React-Version</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
  </style>
  <!-- React & Babel aus CDN, damit es ohne Build läuft -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Deine BarcodeChecker-Komponente als JSX, von Babel im Browser kompiliert -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const ZXING_URL = "https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/index.min.js";

    function normalizeCode(code) {
      return code ? code.replace(/^0+/, "") : "";
    }

    function codesMatch(a, b) {
      return normalizeCode(a) === normalizeCode(b);
    }

    function BarcodeChecker() {
      const [zxingReady, setZxingReady] = useState(false);
      const [scanning, setScanning] = useState(false);
      const [error, setError] = useState(null);
      const [scans, setScans] = useState([]); // last N scans with timestamp
      const [lastScan, setLastScan] = useState(null);
      const [pairStatus, setPairStatus] = useState(null); // {code1, code2, match}
      const [duplicateWarning, setDuplicateWarning] = useState(false);
      const [cameras, setCameras] = useState([]);
      const [selectedCamera, setSelectedCamera] = useState(null);
      const videoRef = useRef(null);
      const readerRef = useRef(null);
      const lastRawRef = useRef(null);
      const lastScanTimeRef = useRef(0);
      const pairBufferRef = useRef([]);
      const scanHistoryRef = useRef([]); // for duplicate detection

      // Load ZXing
      useEffect(() => {
        if (window.ZXing) { setZxingReady(true); return; }
        const script = document.createElement("script");
        script.src = ZXING_URL;
        script.onload = () => setZxingReady(true);
        script.onerror = () => setError("ZXing konnte nicht geladen werden. Internetverbindung prüfen.");
        document.head.appendChild(script);
      }, []);

      // Enumerate cameras
      useEffect(() => {
        if (!zxingReady) return;
        (async () => {
          try {
            const ZXing = window.ZXing;
            const hints = new Map();
            hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
            const allFormats = [
              ZXing.BarcodeFormat.CODE_128,
              ZXing.BarcodeFormat.CODE_39,
              ZXing.BarcodeFormat.EAN_13,
              ZXing.BarcodeFormat.EAN_8,
              ZXing.BarcodeFormat.ITF,
              ZXing.BarcodeFormat.UPC_A,
              ZXing.BarcodeFormat.UPC_E,
              ZXing.BarcodeFormat.QR_CODE,
            ];
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, allFormats);
            const codeReader = new ZXing.BrowserMultiFormatReader(hints);
            readerRef.current = codeReader;
            const devices = await codeReader.listVideoInputDevices();
            setCameras(devices);
            // prefer back camera
            const back = devices.find(d => /back|rear|environment/i.test(d.label));
            setSelectedCamera(back ? back.deviceId : devices[0]?.deviceId);
          } catch (e) {
            setError("Kamera-Zugriff fehlgeschlagen: " + e.message);
          }
        })();
      }, [zxingReady]);

      const handleResult = useCallback((rawCode) => {
        const now = Date.now();
        if (rawCode === lastRawRef.current && now - lastScanTimeRef.current < 1500) return;
        lastRawRef.current = rawCode;
        lastScanTimeRef.current = now;

        const normalized = normalizeCode(rawCode);
        const timestamp = new Date().toLocaleTimeString("de-DE");

        setLastScan({ raw: rawCode, normalized, timestamp });
        setScans(prev => [{ raw: rawCode, normalized, timestamp }, ...prev].slice(0, 30));

        // Pair logic: collect 2 codes, then compare
        pairBufferRef.current = [...pairBufferRef.current, { raw: rawCode, normalized }];
        if (pairBufferRef.current.length === 1) {
          setPairStatus({ code1: pairBufferRef.current[0], code2: null, match: null });
        } else if (pairBufferRef.current.length >= 2) {
          const [c1, c2] = pairBufferRef.current.slice(-2);
          const match = codesMatch(c1.raw, c2.raw);

          // Duplicate detection: same normalized code as last scan
          const hist = scanHistoryRef.current;
          const isDuplicate = hist.length > 0 && hist[hist.length - 1] === normalized;
          scanHistoryRef.current = [...hist, normalized].slice(-50);

          setPairStatus({ code1: c1, code2: c2, match });
          setDuplicateWarning(isDuplicate);
          pairBufferRef.current = [];
        }
      }, []);

      const startScanning = useCallback(async () => {
        if (!readerRef.current || !selectedCamera) return;
        setError(null);
        setScanning(true);
        pairBufferRef.current = [];
        try {
          await readerRef.current.decodeFromVideoDevice(
            selectedCamera,
            videoRef.current,
            (result, err) => {
              if (result) handleResult(result.getText());
            }
          );
        } catch (e) {
          setError("Scanner-Fehler: " + e.message);
          setScanning(false);
        }
      }, [selectedCamera, handleResult]);

      const stopScanning = useCallback(() => {
        readerRef.current?.reset();
        setScanning(false);
        setPairStatus(null);
        pairBufferRef.current = [];
      }, []);

      const resetPair = () => {
        pairBufferRef.current = [];
        setPairStatus(null);
        setDuplicateWarning(false);
      };

      const bgColor = pairStatus?.match === true ? "#1a7a4a" :
        pairStatus?.match === false ? "#b91c1c" : "#1e293b";

      return (
        <div style={{
          minHeight: "100vh", background: bgColor, color: "white",
          fontFamily: "'Segoe UI', sans-serif", padding: "12px",
          transition: "background 0.4s ease"
        }}>
          <h1 style={{ textAlign: "center", fontSize: "1.2rem", marginBottom: 8, fontWeight: 700 }}>
            📬 Mailing Barcode-Checker (React)
          </h1>

          {error && (
            <div style={{ background: "#7f1d1d", borderRadius: 8, padding: 10, marginBottom: 8, fontSize: "0.85rem" }}>
              ⚠️ {error}
            </div>
          )}

          {/* Camera select */}
          {cameras.length > 1 && (
            <select
              value={selectedCamera || ""}
              onChange={e => setSelectedCamera(e.target.value)}
              style={{ width: "100%", marginBottom: 8, padding: 6, borderRadius: 6, fontSize: "0.85rem" }}
              disabled={scanning}
            >
              {cameras.map(c => <option key={c.deviceId} value={c.deviceId}>{c.label || c.deviceId}</option>)}
            </select>
          )}

          {/* Video */}
          <div style={{ position: "relative", borderRadius: 10, overflow: "hidden", marginBottom: 10 }}>
            <video ref={videoRef} style={{ width: "100%", display: "block", borderRadius: 10 }} playsInline muted />
            {scanning && (
              <div style={{
                position: "absolute", top: "50%", left: "10%", right: "10%",
                height: 3, background: "rgba(255,220,0,0.8)",
                boxShadow: "0 0 8px rgba(255,220,0,0.9)",
                animation: "scanline 2s ease-in-out infinite",
                transform: "translateY(-50%)"
              }} />
            )}
          </div>

          <style>{`
            @keyframes scanline {
              0%,100% { top: 30%; } 50% { top: 70%; }
            }
          `}</style>

          {/* Controls */}
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
            {!scanning ? (
              <button onClick={startScanning} disabled={!zxingReady || !selectedCamera}
                style={{ flex: 1, padding: "12px 0", borderRadius: 8, border: "none", background: "#0ea5e9", color: "white", fontSize: "1rem", fontWeight: 700, cursor: "pointer" }}>
                {zxingReady ? "▶ Scannen starten" : "Lade ZXing…"}
              </button>
            ) : (
              <button onClick={stopScanning}
                style={{ flex: 1, padding: "12px 0", borderRadius: 8, border: "none", background: "#64748b", color: "white", fontSize: "1rem", fontWeight: 700, cursor: "pointer" }}>
                ⏹ Stopp
              </button>
            )}
            <button onClick={resetPair}
              style={{ padding: "12px 16px", borderRadius: 8, border: "none", background: "#334155", color: "white", fontSize: "1rem", cursor: "pointer" }}>
              🔄
            </button>
          </div>

          {/* Pair status */}
          {pairStatus && (
            <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 10, padding: 12, marginBottom: 10 }}>
              <div style={{ fontSize: "0.8rem", color: "#94a3b8", marginBottom: 6 }}>PAAR-PRÜFUNG</div>

              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: 8, textAlign: "center" }}>
                  <div style={{ fontSize: "0.7rem", color: "#94a3b8" }}>CODE 1</div>
                  <div style={{ fontWeight: 700, fontSize: "0.95rem", wordBreak: "break-all" }}>
                    {pairStatus.code1?.raw || "—"}
                  </div>
                  <div style={{ fontSize: "0.7rem", color: "#fbbf24" }}>→ {pairStatus.code1?.normalized || "—"}</div>
                </div>
                <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: 8, textAlign: "center" }}>
                  <div style={{ fontSize: "0.7rem", color: "#94a3b8" }}>CODE 2</div>
                  <div style={{ fontWeight: 700, fontSize: "0.95rem", wordBreak: "break-all" }}>
                    {pairStatus.code2?.raw || "wartet…"}
                  </div>
                  <div style={{ fontSize: "0.7rem", color: "#fbbf24" }}>{pairStatus.code2 ? `→ ${pairStatus.code2.normalized}` : ""}</div>
                </div>
              </div>

              {pairStatus.match !== null && (
                <div style={{
                  textAlign: "center", fontSize: "1.5rem", fontWeight: 900, padding: "8px 0",
                  color: pairStatus.match ? "#4ade80" : "#f87171"
                }}>
                  {pairStatus.match ? "✅ IDENTISCH" : "❌ UNTERSCHIEDLICH!"}
                </div>
              )}

              {duplicateWarning && (
                <div style={{ background: "#92400e", borderRadius: 8, padding: 8, marginTop: 6, textAlign: "center", fontWeight: 700 }}>
                  ⚠️ DOPPELDRUCK-VERDACHT! Gleicher Code wie vorhin!
                </div>
              )}
            </div>
          )}

          {/* Last scan */}
          {lastScan && (
            <div style={{ background: "rgba(0,0,0,0.25)", borderRadius: 8, padding: 10, marginBottom: 10, fontSize: "0.85rem" }}>
              <span style={{ color: "#94a3b8" }}>Letzter Scan ({lastScan.timestamp}): </span>
              <strong>{lastScan.raw}</strong>
              {lastScan.raw !== lastScan.normalized && (
                <span style={{ color: "#fbbf24" }}> → {lastScan.normalized}</span>
              )}
            </div>
          )}

          {/* Scan log */}
          {scans.length > 0 && (
            <div style={{ background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: 10 }}>
              <div style={{ fontSize: "0.7rem", color: "#94a3b8", marginBottom: 6 }}>SCAN-PROTOKOLL</div>
              {scans.slice(0, 8).map((s, i) => (
                <div key={i} style={{ fontSize: "0.75rem", padding: "3px 0", borderBottom: "1px solid rgba(255,255,255,0.05)", display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "#e2e8f0" }}>{s.raw}</span>
                  <span style={{ color: "#64748b" }}>{s.timestamp}</span>
                </div>
              ))}
            </div>
          )}

          {!scanning && !zxingReady && (
            <div style={{ textAlign: "center", color: "#94a3b8", fontSize: "0.85rem", marginTop: 16 }}>
              Lade Barcode-Bibliothek…
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<BarcodeChecker />);
  </script>
</body>
</html>
