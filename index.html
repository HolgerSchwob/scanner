<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Barcode-Checker – Zwei Codes vergleichen</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 12px;
      padding-bottom: env(safe-area-inset-bottom, 12px);
      -webkit-tap-highlight-color: transparent;
    }
    .screen { min-height: 80vh; display: flex; flex-direction: column; }
    h1 { font-size: 1.25rem; margin: 0 0 12px; text-align: center; font-weight: 700; }
    .error-banner {
      background: #7f1d1d; color: #fecaca; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 0.9rem;
    }
    #videoWrap {
      position: relative; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 12px;
      aspect-ratio: 4/3; max-height: 40vh;
    }
    #video {
      width: 100%; height: 100%; display: block; border-radius: 12px; object-fit: cover;
      -webkit-transform: scaleX(1); transform: scaleX(1);
    }
    #scanZone {
      position: absolute; left: 15%; top: 15%; width: 70%; height: 70%;
      border: 3px solid rgba(255,220,0,0.9); border-radius: 10px; pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
    }
    .scanline {
      position: absolute; left: 10%; right: 10%; height: 4px;
      background: rgba(255,220,0,0.9); box-shadow: 0 0 12px rgba(255,220,0,0.9);
      top: 40%; animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%, 100% { top: 25%; } 50% { top: 75%; } }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .controls button {
      flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
      -webkit-appearance: none; appearance: none;
    }
    #btnStart { background: #0ea5e9; color: #fff; }
    #btnStop { background: #64748b; color: #fff; }
    #btnReset { padding: 14px 20px; background: #334155; color: #fff; }
    .pair-box {
      background: rgba(0,0,0,0.25); border-radius: 12px; padding: 14px; margin-bottom: 12px;
    }
    .pair-box .label { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    .pair-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .code-cell {
      background: rgba(255,255,255,0.12); border-radius: 8px; padding: 10px; text-align: center;
    }
    .code-cell .raw { font-weight: 700; font-size: 0.95rem; word-break: break-all; }
    .code-cell .norm { font-size: 0.75rem; color: #fbbf24; margin-top: 4px; }
    .result {
      text-align: center; font-size: 1.5rem; font-weight: 900; padding: 12px 0;
      border-radius: 8px; margin-top: 8px;
    }
    .result.ok { background: rgba(34,197,94,0.4); color: #86efac; }
    .result.fail { background: rgba(185,28,28,0.5); color: #fca5a5; }
    .last-scan { font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-top: 8px; }
    .last-scan strong { color: #fff; }
    select {
      width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; font-size: 0.9rem;
      background: #1e293b; color: #fff; border: 1px solid #334155;
    }
    .cycle-status {
      text-align: center; font-size: 1.1rem; font-weight: 800; padding: 12px; margin-bottom: 10px; border-radius: 10px;
      letter-spacing: 0.02em;
    }
    .cycle-status.step1 { background: rgba(59,130,246,0.4); color: #93c5fd; }
    .cycle-status.step2 { background: rgba(234,179,8,0.35); color: #fde047; }
    .cycle-status.ok { background: rgba(34,197,94,0.5); color: #86efac; }
    .cycle-status.fail { background: rgba(185,28,28,0.5); color: #fca5a5; }
    .state-idle { background: #1e293b; color: #e2e8f0; }
    .state-ok { background: #14532d; color: #dcfce7; transition: background 0.4s ease; }
    .state-fail { background: #7f1d1d; color: #fecaca; transition: background 0.4s ease; }
    #flashOverlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 9999; opacity: 0;
      transition: opacity 0.15s ease-out;
    }
    #flashOverlay.flash { transition: none; }
    #flashOverlay.green { background: rgba(34,197,94,0.75); }
    #flashOverlay.red { background: rgba(185,28,28,0.8); }
  </style>
</head>
<body class="state-idle">
  <div id="flashOverlay" aria-hidden="true"></div>
  <div class="screen">
    <h1>📬 Barcode-Checker</h1>
    <p style="text-align:center; margin:0 0 12px; font-size:0.9rem; opacity:0.9;">Scanne nacheinander zwei Barcodes (Code 128). Vergleich ignoriert führende Nullen. Barcode in den gelben Rahmen halten.</p>

    <div id="errorBanner" class="error-banner" style="display:none;"></div>

    <div id="cameraSelectWrap" style="display:none;">
      <label for="cameraSelect">Kamera</label>
      <select id="cameraSelect"></select>
    </div>

    <div id="videoWrap" style="display:none;">
      <video id="video" playsinline muted autoplay></video>
      <div id="scanZone" style="display:none;" aria-hidden="true"></div>
      <div class="scanline" id="scanline" style="display:none;"></div>
    </div>

    <div class="controls">
      <button type="button" id="btnStart">▶ Scannen starten</button>
      <button type="button" id="btnStop" style="display:none;">⏹ Stopp</button>
      <button type="button" id="btnReset">🔄 Neu</button>
    </div>

    <div id="cycleStatus" class="cycle-status" style="display:none;"></div>

    <div id="pairBox" class="pair-box" style="display:none;">
      <div class="label">PAAR-PRÜFUNG</div>
      <div class="pair-row">
        <div class="code-cell">
          <div class="label">CODE 1</div>
          <div class="raw" id="code1Raw">—</div>
          <div class="norm" id="code1Norm">—</div>
        </div>
        <div class="code-cell">
          <div class="label">CODE 2</div>
          <div class="raw" id="code2Raw">wartet…</div>
          <div class="norm" id="code2Norm"></div>
        </div>
      </div>
      <div id="resultLine" class="result" style="display:none;"></div>
    </div>

    <div id="lastScan" class="last-scan" style="display:none;"></div>
  </div>

  <script>
    (function () {
      // Führende Nullen entfernen – Vergleich nur auf die restlichen Ziffern
      function normalizeCode(code) {
        if (!code || typeof code !== "string") return "";
        return code.replace(/^0+/, "") || "0";
      }

      function codesMatch(a, b) {
        return normalizeCode(a) === normalizeCode(b);
      }

      var video = document.getElementById("video");
      var videoWrap = document.getElementById("videoWrap");
      var scanline = document.getElementById("scanline");
      var errorBanner = document.getElementById("errorBanner");
      var cameraSelectWrap = document.getElementById("cameraSelectWrap");
      var cameraSelect = document.getElementById("cameraSelect");
      var btnStart = document.getElementById("btnStart");
      var btnStop = document.getElementById("btnStop");
      var btnReset = document.getElementById("btnReset");
      var pairBox = document.getElementById("pairBox");
      var code1Raw = document.getElementById("code1Raw");
      var code1Norm = document.getElementById("code1Norm");
      var code2Raw = document.getElementById("code2Raw");
      var code2Norm = document.getElementById("code2Norm");
      var resultLine = document.getElementById("resultLine");
      var lastScanEl = document.getElementById("lastScan");
      var cycleStatusEl = document.getElementById("cycleStatus");
      var body = document.body;

      function setCycleStatus(step, text) {
        if (!cycleStatusEl) return;
        cycleStatusEl.className = "cycle-status " + step;
        cycleStatusEl.textContent = text;
        cycleStatusEl.style.display = "block";
      }

      var codeReader = null;
      var pairBuffer = [];
      var lastRaw = null;
      var lastTime = 0;
      var cameras = [];
      var selectedDeviceId = null;

      var ZXING_CDNS = [
        "https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js",
        "https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/index.min.js"
      ];

      function showError(msg) {
        errorBanner.textContent = "⚠️ " + msg;
        errorBanner.style.display = "block";
      }

      function clearError() {
        errorBanner.style.display = "none";
      }

      function setBodyState(s) {
        body.classList.remove("state-idle", "state-ok", "state-fail");
        body.classList.add("state-" + s);
      }

      var audioCtx = null;
      function beep(freq, durationMs, type) {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();
          var o = audioCtx.createOscillator();
          var g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          o.frequency.value = freq;
          o.type = type || "sine";
          g.gain.setValueAtTime(0.15, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + durationMs / 1000);
          o.start(audioCtx.currentTime);
          o.stop(audioCtx.currentTime + durationMs / 1000);
        } catch (e) {}
      }
      function beepScan() { beep(800, 80, "sine"); }
      function beepOk() { beep(880, 100, "sine"); setTimeout(function () { beep(1100, 120, "sine"); }, 120); }
      function beepFail() {
        beep(400, 120, "sine");
        setTimeout(function () { beep(400, 120, "sine"); }, 180);
        setTimeout(function () { beep(400, 120, "sine"); }, 360);
      }

      var flashEl = document.getElementById("flashOverlay");
      function flash(color) {
        if (!flashEl) return;
        flashEl.className = "flash " + color;
        flashEl.style.opacity = "1";
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            flashEl.classList.remove("flash");
            flashEl.style.transition = "opacity 0.25s ease-out";
            flashEl.style.opacity = "0";
          });
        });
      }

      function loadScript(url) {
        return new Promise(function (resolve, reject) {
          if (window.ZXing) { resolve(); return; }
          var s = document.createElement("script");
          s.src = url;
          s.crossOrigin = "anonymous";
          s.onload = function () {
            s.setAttribute("data-loaded", "1");
            var t = Date.now();
            function check() {
              if (window.ZXing) { resolve(); return; }
              if (Date.now() - t < 3000) setTimeout(check, 100);
              else reject(new Error("ZXing nicht gefunden"));
            }
            check();
          };
          s.onerror = function () { reject(new Error("Netzwerkfehler: " + url)); };
          document.head.appendChild(s);
        });
      }

      function initZxing() {
        if (window.ZXing) return Promise.resolve();
        var i = 0;
        function tryNext() {
          if (i >= ZXING_CDNS.length) {
            showError("ZXing konnte nicht geladen werden. Internet prüfen (WLAN/Daten).");
            return Promise.reject();
          }
          btnStart.textContent = "Lade ZXing… (" + (i + 1) + "/" + ZXING_CDNS.length + ")";
          return loadScript(ZXING_CDNS[i]).catch(function () {
            i++;
            return tryNext();
          });
        }
        return tryNext();
      }

      function pickDefaultCamera(devices) {
        if (!devices || !devices.length) return null;
        var back = devices.filter(function (d) { return /back|rear|environment/i.test(d.label || ""); });
        if (!back.length) return devices[0];
        var wide = back.find(function (d) {
          var l = (d.label || "").toLowerCase();
          return !/ultra\s*wide|ultraweit|ultra-wide|weitwinkel/.test(l);
        });
        return wide || back[0];
      }

      function listCameras() {
        if (!window.ZXing) return;
        var hints = new Map();
        hints.set(window.ZXing.DecodeHintType.POSSIBLE_FORMATS, [window.ZXing.BarcodeFormat.CODE_128]);
        codeReader = new window.ZXing.BrowserMultiFormatReader(hints, 150);
        codeReader.listVideoInputDevices().then(function (devices) {
          cameras = devices;
          if (devices.length > 1) {
            cameraSelectWrap.style.display = "block";
            cameraSelect.innerHTML = "";
            var defaultCam = pickDefaultCamera(devices);
            selectedDeviceId = defaultCam ? defaultCam.deviceId : (devices[0] && devices[0].deviceId);
            devices.forEach(function (d) {
              var opt = document.createElement("option");
              opt.value = d.deviceId;
              opt.textContent = d.label || d.deviceId;
              if (d.deviceId === selectedDeviceId) opt.selected = true;
              cameraSelect.appendChild(opt);
            });
            cameraSelect.onchange = function () { selectedDeviceId = cameraSelect.value; };
          } else if (devices.length === 1) {
            selectedDeviceId = devices[0].deviceId;
          }
        }).catch(function (e) {
          showError("Kamera-Zugriff: " + (e.message || e));
        });
      }

      function onResult(rawCode) {
        var now = Date.now();
        if (rawCode === lastRaw && now - lastTime < 1200) return;
        lastRaw = rawCode;
        lastTime = now;

        var normalized = normalizeCode(rawCode);
        lastScanEl.style.display = "block";
        lastScanEl.innerHTML = "Letzter Scan (" + new Date().toLocaleTimeString("de-DE") + "): <strong>" + escapeHtml(rawCode) + "</strong>";
        if (rawCode !== normalized) lastScanEl.innerHTML += " <span style='color:#fbbf24'>→ " + escapeHtml(normalized) + "</span>";

        pairBuffer.push({ raw: rawCode, normalized: normalized });
        if (pairBuffer.length === 1) {
          beepScan();
          setCycleStatus("step1", "1. ERSTER CODE — erfasst ✓");
          pairBox.style.display = "block";
          code1Raw.textContent = pairBuffer[0].raw;
          code1Norm.textContent = "→ " + pairBuffer[0].normalized;
          code2Raw.textContent = "wartet…";
          code2Norm.textContent = "";
          resultLine.style.display = "none";
          setBodyState("idle");
          setTimeout(function () {
            if (pairBuffer.length === 1) setCycleStatus("step2", "2. ZWEITER CODE — Scanne jetzt den zweiten Barcode");
          }, 600);
        } else if (pairBuffer.length >= 2) {
          beepScan();
          var c1 = pairBuffer[pairBuffer.length - 2];
          var c2 = pairBuffer[pairBuffer.length - 1];
          code1Raw.textContent = c1.raw;
          code1Norm.textContent = "→ " + c1.normalized;
          code2Raw.textContent = c2.raw;
          code2Norm.textContent = "→ " + c2.normalized;
          var match = codesMatch(c1.raw, c2.raw);
          resultLine.style.display = "block";
          resultLine.className = "result " + (match ? "ok" : "fail");
          resultLine.textContent = match ? "✅ IDENTISCH" : "❌ FEHLER – Zahlen passen nicht!";
          setBodyState(match ? "ok" : "fail");
          if (match) {
            setCycleStatus("ok", "✅ OK — Identisch (bis auf führende Nullen)");
            flash("green");
            beepOk();
          } else {
            setCycleStatus("fail", "❌ FALSCH — Zahlen passen nicht!");
            flash("red");
            beepFail();
          }
          pairBuffer = [];
          setTimeout(startNextPair, 2600);
        }
      }

      function startNextPair() {
        pairBuffer = [];
        if (resultLine) resultLine.style.display = "none";
        if (code1Raw) code1Raw.textContent = "—";
        if (code1Norm) code1Norm.textContent = "—";
        if (code2Raw) code2Raw.textContent = "wartet…";
        if (code2Norm) code2Norm.textContent = "";
        setCycleStatus("step1", "1. ERSTER CODE — Scanne jetzt den ersten Barcode");
        setBodyState("idle");
      }

      function escapeHtml(s) {
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function ensureCameraReady() {
        return new Promise(function (resolve, reject) {
          if (selectedDeviceId) { resolve(); return; }
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            reject(new Error("Kamera-API nicht unterstützt (HTTPS nötig)."));
            return;
          }
          btnStart.style.display = "block";
          btnStop.style.display = "none";
          btnStart.textContent = "Kamera-Berechtigung…";
          navigator.mediaDevices.getUserMedia({ video: true }).then(function (stream) {
            stream.getTracks().forEach(function (t) { t.stop(); });
            return codeReader.listVideoInputDevices();
          }).then(function (devices) {
            cameras = devices;
            if (devices.length > 1) {
              var defaultCam = pickDefaultCamera(devices);
              selectedDeviceId = defaultCam ? defaultCam.deviceId : (devices[0] && devices[0].deviceId);
              cameraSelectWrap.style.display = "block";
              cameraSelect.innerHTML = "";
              devices.forEach(function (d) {
                var opt = document.createElement("option");
                opt.value = d.deviceId;
                opt.textContent = d.label || d.deviceId;
                if (d.deviceId === selectedDeviceId) opt.selected = true;
                cameraSelect.appendChild(opt);
              });
              cameraSelect.onchange = function () { selectedDeviceId = cameraSelect.value; };
            } else if (devices.length === 1) {
              selectedDeviceId = devices[0].deviceId;
            }
            resolve();
          }).catch(function (e) {
            reject(e);
          });
        });
      }

      function startScanning() {
        if (!codeReader) {
          showError("Kamera nicht bereit. Bitte Seite neu laden.");
          return;
        }
        clearError();
        pairBuffer = [];
        if (!audioCtx) {
          try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === "suspended") audioCtx.resume();
          } catch (e) {}
        }
        videoWrap.style.display = "block";
        scanline.style.display = "block";
        var deviceId = selectedDeviceId || undefined;
        function doStart() {
          btnStart.style.display = "none";
          btnStop.style.display = "block";
          var scanZoneEl = document.getElementById("scanZone");
          if (scanZoneEl) scanZoneEl.style.display = "block";
          setCycleStatus("step1", "1. ERSTER CODE — Scanne jetzt den ersten Barcode");
          var constraints = {
            video: deviceId
              ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }
              : { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
          };
          codeReader.decodeFromConstraints(constraints, video, function (result, err) {
            if (result) onResult(result.getText());
          }).catch(function (e) {
            showError("Scanner: " + (e.message || e));
            stopScanning();
          });
        }
        if (selectedDeviceId) {
          doStart();
        } else {
          ensureCameraReady().then(function () {
            deviceId = selectedDeviceId || undefined;
            doStart();
          }).catch(function (e) {
            showError("Kamera: " + (e.message || e) + " Bitte Zugriff in den Browser-Einstellungen erlauben.");
            btnStart.textContent = "▶ Scannen starten";
            btnStart.style.display = "block";
            btnStop.style.display = "none";
            videoWrap.style.display = "none";
          });
        }
      }

      function stopScanning() {
        if (codeReader && typeof codeReader.reset === "function") codeReader.reset();
        scanline.style.display = "none";
        var sz = document.getElementById("scanZone");
        if (sz) sz.style.display = "none";
        btnStart.style.display = "block";
        btnStop.style.display = "none";
        if (cycleStatusEl) cycleStatusEl.style.display = "none";
        setBodyState("idle");
      }

      function resetPair() {
        startNextPair();
        if (pairBox) pairBox.style.display = "block";
      }

      btnStart.addEventListener("click", startScanning);
      btnStop.addEventListener("click", stopScanning);
      btnReset.addEventListener("click", resetPair);

      initZxing().then(function () {
        listCameras();
        btnStart.textContent = "▶ Scannen starten";
        btnStart.disabled = false;
        setTimeout(startScanning, 1200);
      });
      btnStart.disabled = true;
      btnStart.textContent = "Lade ZXing…";
    })();
  </script>
</body>
</html>
